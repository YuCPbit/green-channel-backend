spring:
  application:
    name: green-channel-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/green_channel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    edu.greenchannel: DEBUG

