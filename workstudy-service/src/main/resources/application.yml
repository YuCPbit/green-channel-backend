spring:
  application:
    name: workstudy-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/green_channel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api/workstudy

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto
