server:
  port: 8094

spring:
  application:
    name: gcs-dashboard-service
  datasource:
    url: jdbc:mysql://localhost:3306/green_channel?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 20040526
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
